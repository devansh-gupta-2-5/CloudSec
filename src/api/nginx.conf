# CLOUDSEC/src/api/nginx.conf

#sudo nginx -c $(pwd)/nginx.conf -g "daemon off;"

worker_processes auto;
pid /tmp/nginx_cloudsec.pid;

events {
    worker_connections 1024;
}

http {
    server_tokens off; # Hide Nginx version for security
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Basic performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # --- AUTOMATED MITIGATION: Rate Limiting ---
    # Define a zone named "api_limit" that tracks requests by IP ($binary_remote_addr).
    # It allows 10 requests per second. 
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # --- Logging ---
    # We will output Nginx logs to your CLOUDSEC/logs folder
    # Use the full path to your CLOUDSEC logs folder
access_log /path_to_Cloudsec/logs/gateway_access.log;
error_log  /path_to_CloudSec/logs/gateway_error.log warn;

    server {
        # Listening on standard HTTP port (We can add 443 TLS later if needed)
        listen 8081;
        server_name localhost;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Server "SecureCloud-Gateway"; # Obscure the Nginx version

        # --- RULE 1: Hide Internal Endpoints ---
        # The outside world MUST NOT be able to trigger the IP ban.
        location /internal/ {
            deny all;
            return 403;
        }

        # Exact match for no slash
location = /login {
    proxy_pass http://127.0.0.1:8080/login;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# Exact match for trailing slash
location = /login/ {
    proxy_pass http://127.0.0.1:8080/login;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

        # --- RULE 2: Proxy Everything Else to C++ ---
        location / {
    # Apply the rate limit
    limit_req zone=api_limit burst=20 nodelay;

    # FIX: This tells Nginx NOT to try and "fix" the URL by adding slashes
    proxy_redirect off;

    # Forward traffic to the Crow C++ Server
    # Note: Removing the trailing slash from the proxy_pass URL 
    # ensures Nginx passes the URI exactly as requested.
    proxy_pass http://127.0.0.1:8080;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
    }
}
